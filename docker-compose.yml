services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: lensrock-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - lensrock-sql-data:/var/opt/mssql

volumes:
  lensrock-sql-data:
